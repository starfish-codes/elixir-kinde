name: Publish to hex.pm

on:
  release:
    types:
      - published

jobs:
  publish:

    name: Publish on hex.pm
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Install deps
      run: mix deps.get

    - name: Publish
      env:
        HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      run: mix hex.publish --yes
